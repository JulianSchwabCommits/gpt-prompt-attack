<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
      <meta charset="UTF-8">
      <meta name="mobile-web-app-capable" content="yes">
      <link href="blipz.css" rel="stylesheet" type="text/css">
      <style>
         html{
            margin: 0 auto;
            width: 550px;
            font-family: arial;
            background-color: #22201d;
         }
         body{
            margin-bottom: 80px;
         }
         #counter{
            position: absolute;
            right: 10px;
            top: 5px;
            line-height: 30px;
            padding: 0 5px 0 5px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            border-radius: 12px;
            width: 30px;
            height: 30px;
            background-color: lightgrey;
            color:black;
            font-family: monospace;
         }
         input, select, .twitter{
            outline: none;
            line-height: 30px;
            border: 2px solid #efe2ba;
            box-sizing: border-box;
            padding: 3px;
         }
         input[type="text"]{
            box-sizing: border-box;
         }
         #t{
            width: 100%;
         }
         input[type="submit"], select{
            background-color: #d79922;
            color: white;
            font-weight: bold;
            float: right;
            width: 60px;
         }
         input[type="submit"]{
            display: inline-block;
         }
         input[type="submit"]:hover:not([disabled]){
             color: #f13c20;
         }
         input[type="submit"]:disabled{
            opacity:0.5;
            cursor: wait;
         }
         .rotate{
            width:10px;height:10px;
            border: 1px solid grey;
            animation: r 0.8s linear infinite;
            display: inline-block !important;
         }
         @keyframes r{to{transform:rotate(360deg)}}
         #indicator{
            position:absolute;
            left: calc(50% - 10px);
            top: calc(50% - 10px);
            width: 20px;
            height: 20px;
            display: inline-block;
            border: 2px solid black;
            border-radius: 8px;
            display: none;
            background-color: lightgrey;
         }
         #app{
            margin-top:40px;
            background-color: white;
            padding: 20px 20px 20px 20px;
            border: 20px solid grey;
         }
         iframe{
            border: none;
            width: 100%;
            color: white;
            margin: 0 auto;
            height: 140px;
            box-sizing: border-box;
            border: 2px solid grey;
         }
         #system{
            font-family: monospace;
            padding: 10px;
            border: 2px solid #efe2ba;
         }
         .title{
            font-weight: bold;
         }
         select{
            width: 85px;
         }
         select:hover{
            color: #f13c20;
         }
         a[href]{
            font-weight: bold;
            color: black;
            text-decoration:underline;
         }
         h3{
            font-weight: bold;
            font-size: 20px;
            margin:0px 15px 15px 15px
         }
         @media screen and (max-width: 760px){
            html{
                width: 100%; margin: 0 auto;
            }
            #app{
            border: 5px solid grey;
            }
         }
         .header {
            text-align: center;
            background-color: #47433d;
            padding: 10px;
            margin-bottom: 1em;
            border-radius: 3px;
            font-size: 1.5em;
            font-weight: 1000;
         }
      </style>
   </head>
   <body>
      <div id=app>
         <form target=response action="https://ggpt-api.43z.one/v2">
            <div>
               The goal of this game is to come up with the <b>shortest</b> user input that tricks the system prompt into
               returning the <b>secret key</b> back to you.<br>
               <br>Created by <a href=https://twitter.com/h43z>@h43z</a>.
               <br>
            </div>
            <select name=level id="levelslist"></select>
            <br><br>
            <div class=title>System Prompt</div>
            <div id=system></div>
            <br>
            <div class=title>User</div>
            <div style="width: 100%">
               <div style="position:relative;display:inline-block;width:calc(100% - 70px)">
                  <span id=counter>0</span>
                  <input placeholder='your input here' autocomplete=off type=text minlength=1 required maxlength=80 id=t name=user oninput="counter.innerText=this.value.length"></input>
               </div>
               <input id=submitButton type=submit value=submit>
            </div>
         </form>
         <br>
         <div style="position:relative">
            <span id=indicator></span>
            <div class=title>Assistant</div>
            <iframe id=assistant name=response onload='indicator.classList.remove(`rotate`);'></iframe>
         </div>
      </div>
   </body>
</html>
<script src="main.js" type=module></script>
</html>
